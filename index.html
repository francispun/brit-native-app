<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brit-Native 🇬🇧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .message { max-width: 80%; }
    .chat-container { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col">
  <div class="max-w-2xl mx-auto w-full p-4 flex-1 flex flex-col">
   
    <header class="py-6 border-b border-gray-800 flex items-center justify-between">
      <h1 class="text-3xl font-semibold flex items-center gap-3">
        🇬🇧 Brit-Native
        <span class="text-sm bg-green-600 px-3 py-1 rounded-full text-xs">B1/B2 Coach</span>
      </h1>
      <button id="signoutBtn" onclick="signOut()" class="text-sm text-gray-400 hover:text-white hidden">Sign out</button>
    </header>

    <!-- Auth Screen -->
    <div id="authScreen" class="flex-1 flex items-center justify-center">
      <div class="text-center max-w-xs w-full">
        <h2 class="text-2xl mb-8">Welcome to Brit-Native</h2>
        <input id="emailInput" type="email" placeholder="your@email.com"
               class="block w-full bg-gray-900 border border-gray-700 rounded-3xl px-6 py-4 mb-4 outline-none text-center focus:border-pink-500">
        <button onclick="sendMagicLink()"
                class="bg-pink-600 hover:bg-pink-700 w-full py-4 rounded-3xl font-medium transition">
          Send Magic Link
        </button>
        <p class="text-xs text-gray-500 mt-6">We'll email you a secure link to sign in</p>
      </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="hidden flex-1 flex flex-col">
      <div id="chat" class="flex-1 overflow-y-auto py-8 space-y-6 chat-container"></div>
     
      <div class="pt-4 border-t border-gray-800">
        <div class="flex gap-3">
          <input id="messageInput" type="text"
                 class="flex-1 bg-gray-900 border border-gray-700 rounded-3xl px-6 py-4 outline-none focus:border-pink-500"
                 placeholder="Type here...">
          <button onclick="sendMessage()"
                  class="bg-pink-600 hover:bg-pink-700 px-8 rounded-3xl font-medium transition">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ================== CONFIG ==================
    const SUPABASE_URL = "https://your-project.supabase.co";
    const SUPABASE_ANON_KEY = "your-anon-key-here";
    const FUNCTION_URL = `${SUPABASE_URL}/functions/v1/brit-native-chat`;

    // Create Supabase client (Correct v2 way)
    let supabaseClient;
    let currentUser = null;

    const authScreen = document.getElementById('authScreen');
    const chatScreen = document.getElementById('chatScreen');
    const chatDiv = document.getElementById('chat');
    const messageInput = document.getElementById('messageInput');

    function initSupabase() {
      supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // Auth functions
    window.sendMagicLink = async function() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) return alert("Please enter your email");

      try {
        const { error } = await supabaseClient.auth.signInWithOtp({ email });
        if (error) throw error;
        alert("✅ Magic link sent! Check your email.");
      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    window.showChat = function() {
      authScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      document.getElementById('signoutBtn').classList.remove('hidden');
      
      window.addMessage('assistant', `Hello mate! 👋 I'm Brit-Native, your friendly British English coach.\n\nReady to practise for your UK citizenship test? What's on your mind today?`);
    };

    window.addMessage = function(role, content) {
      const div = document.createElement('div');
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `
        <div class="message px-5 py-3 rounded-3xl ${role === 'user' ? 'bg-blue-600' : 'bg-gray-800'}">
          ${content.replace(/\n/g, '<br>')}
        </div>
      `;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    };

    window.sendMessage = async function() {
      const text = messageInput.value.trim();
      if (!text || !currentUser) return;

      window.addMessage('user', text);
      const tempText = text;
      messageInput.value = '';

      try {
        const res = await fetch(FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            user_id: currentUser.id,
            message: tempText
          })
        });

        const data = await res.json();
        window.addMessage('assistant', data.reply || "Sorry mate, something went wrong.");
      } catch (err) {
        console.error(err);
        window.addMessage('assistant', "Couldn't connect to the server. Try again.");
      }
    };

    window.signOut = async function() {
      await supabaseClient.auth.signOut();
      location.reload();
    };

    // Initialize everything
    window.onload = function() {
      if (!SUPABASE_URL.includes("your-project") && !SUPABASE_ANON_KEY.includes("your-anon-key")) {
        initSupabase();
        
        // Check if already signed in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          if (session) {
            currentUser = session.user;
            window.showChat();
          }
        });

        // Listen for auth changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
          if (session) {
            currentUser = session.user;
            window.showChat();
          }
        });
      } else {
        document.body.innerHTML = `<div class="flex items-center justify-center h-screen text-red-400 text-center p-8">
          <p><strong>Configuration Error</strong><br><br>Please replace SUPABASE_URL and SUPABASE_ANON_KEY with your real Supabase credentials.</p>
        </div>`;
      }
    };
  </script>
</body>
</html>
